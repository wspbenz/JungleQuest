<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Quest</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>

<body>

    <!-- background -->
    <img id="mangrovebg" class="bgimage" src="assets/mangrove.jpeg" alt="spacebg" style="display: none;">
    <img id="samuraibg" class="bgimage" src="assets/samurai.jpg" alt="spacebg" style="display: none;">
    <img id="defaultbg" class="bgimage" src="assets/bg.jpg" alt="bg">
    <!-- navbar -->
    <nav>
        <div class="navlogo">
            <img src="assets/navlogo.png" alt="navlogo">
        </div>
    </nav>

    <!-- main -->
    <section class="main">

        <!-- alertboxes -->
        <div id="unlock" class="alertbox">
            <p>Mangrove Theme Unlocked!</p>
        </div>
        <div id="unlocksamurai" class="alertbox">
            <p>Samurai Theme Unlocked!</p>
        </div>

        <img id="levelup" src="assets/levelup.png" alt="lvlup">
        <h1 id="counter">0</h1>

        <!-- crates -->
        <img id="defaultcrate" src="assets/crate.png" alt="defaultcrate" width="350px"> <img id="lvl20crate"
            src="assets/lvl20crate.png" alt="lvl20crate" style="display: none;">
        <img id="lvl50crate" src="assets/lvl50crate.png" alt="lvl50">
        <img id="lvl100crate" src="assets/lvl100crate.png" alt="lvl100crate" style="display: none;">
    </section>

    <!-- leveltab -->
    <section class="levels">
        <div class="leveltab">
            <h1 class="levelstext" id="levels"></h1>
            <img class="levelsrank" id="rankicon" src="assets/rank.png" alt="rankicon" width="70px">
            <img class="levelsbar" id="levelbar" src="assets/levelbar.png" alt="levelbar" width="160px">
        </div>
    </section>
</body>

</html>
