<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Quest</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
    <link rel="shortcut icon" href="assets/lvl100crate.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://benzethical.github.io/JungleQuest/" />
    <meta property="og:description"
        content="JungleQuest is a Web based game. Click, Earn XP, Level up & Earn new rewards." />
    <meta property="og:title" content="JungleQuest" />
</head>

<body>

    <!-- background -->
    <img id="mangrovebg" class="bgimage" src="assets/mangrove.jpg" alt="spacebg" style="display: none;">
    <img id="samuraibg" class="bgimage" src="assets/samurai.jpg" alt="spacebg" style="display: none;">
    <img id="defaultbg" class="bgimage" src="assets/bg.jpg" alt="bg">
    <!-- navbar -->
    <nav>
        <div class="navlogo">
            <img src="assets/navlogo.png" alt="navlogo">
        </div>
    </nav>

    <!-- main -->
    <section class="main">

        <img id="levelup" src="assets/levelup.png" alt="lvlup" style="display: none;">
        <h1 id="counter">0</h1>

        <!-- crates -->
        <img id="defaultcrate" src="assets/crate.png" alt="defaultcrate" width="350px"> <img id="lvl20crate"
            src="assets/lvl20crate.png" alt="lvl20crate" style="display: none;">
        <img id="lvl50crate" src="assets/lvl50crate.png" alt="lvl50">
        <img id="lvl100crate" src="assets/lvl100crate.png" alt="lvl100crate" style="display: none;">
    </section>

    <!-- leveltab -->
    <section class="levels">
        <div class="leveltab">
            <h1 class="levelstext" id="levels"></h1>
            <img class="levelsrank" id="rankicon" src="assets/rank.png" alt="rankicon" width="70px">
            <img class="levelsbar" id="levelbar" src="assets/levelbar.png" alt="levelbar" width="160px">
        </div>
    </section>
</body>

</html>
